name: Atualizar concursos DF

on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  atualizar:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar o repositório
        uses: actions/checkout@v4

      - name: Preparar o Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Coletar concursos do DF
        run: python scripts/coletar.py

      - name: Salvar se houve mudança
        run: |
          git config user.name "concursos-df-bot"
          git config user.email "bot@users.noreply.github.com"
          git add docs/data.json
          git diff --staged --quiet || git commit -m "Atualiza concursos DF ($(date +%F))"
          git push
