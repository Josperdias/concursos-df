<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Concursos DF — atualização automática</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@700;800&family=IBM+Plex+Mono:wght@500&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--ink:#0E1F33;--ink2:#33445a;--navy:#123A63;--navy-deep:#0B2640;--gold:#C9A227;
    --paper:#EAECF0;--card:#FCFCFD;--line:#D4D8E0;--line-soft:#E6E9EF;--slate:#5b6478;
    --green:#1C7C4A;--green-bg:#E5F2EA;--teal:#0E6E6E;--teal-bg:#DEEEEE;--blue:#2B5C8A;--blue-bg:#E3ECF5;--amber:#9C6510;--amber-bg:#F6ECDA;--slate-bg:#E8EAEF}
  *{box-sizing:border-box}
  body{margin:0;background:var(--paper);color:var(--ink);font-family:"IBM Plex Sans",system-ui,sans-serif;font-size:15px;line-height:1.5}
  .wrap{max-width:900px;margin:0 auto;padding:0 18px}
  header{background:var(--navy-deep);color:#fff;border-bottom:3px solid var(--gold)}
  .hd{padding:22px 0 18px}
  .mono{font-family:"IBM Plex Mono",monospace}
  .brand{font-family:"IBM Plex Mono";font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:#9FB6CE}
  h1{font-family:"Archivo";font-weight:800;font-size:clamp(24px,5vw,34px);margin:5px 0 0;letter-spacing:-.01em}
  .upd{color:#B9C7D6;font-size:12.5px;margin-top:8px}
  main{padding:22px 0 60px}
  .tools{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:16px}
  .tools input{flex:1;min-width:180px;border:1px solid var(--line);border-radius:10px;padding:10px 12px;font-size:14px;background:#fff;font-family:inherit}
  .seg{display:flex;background:var(--card);border:1px solid var(--line);border-radius:10px;overflow:hidden}
  .seg button{border:0;background:none;padding:9px 13px;font-size:12.5px;font-weight:600;color:var(--slate);border-right:1px solid var(--line-soft);cursor:pointer}
  .seg button:last-child{border-right:0}
  .seg button[aria-pressed=true]{background:var(--navy);color:#fff}
  .item{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin-bottom:12px;box-shadow:0 1px 2px rgba(14,31,51,.05),0 8px 20px rgba(14,31,51,.05)}
  .item .top{display:flex;justify-content:space-between;gap:10px;align-items:baseline;flex-wrap:wrap}
  .item a.t{font-family:"Archivo";font-weight:700;font-size:16px;color:var(--ink);text-decoration:none;line-height:1.2}
  .item a.t:hover{color:var(--navy);text-decoration:underline}
  .st{font-family:"IBM Plex Mono";font-size:9.5px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;padding:4px 8px;border-radius:5px;border:1.5px solid;white-space:nowrap}
  .st.aberta{color:var(--green);border-color:var(--green);background:var(--green-bg)}
  .st.publicado{color:var(--green);border-color:var(--green);background:var(--green-bg)}
  .st.autorizado{color:var(--teal);border-color:var(--teal);background:var(--teal-bg)}
  .st.previsto{color:var(--amber);border-color:var(--amber);background:var(--amber-bg)}
  .st.outro{color:var(--slate);border-color:#9AA3B4;background:var(--slate-bg)}
  .meta{font-family:"IBM Plex Mono";font-size:11px;color:var(--slate);margin-top:7px}
  .meta b{color:var(--navy)}
  .empty,.loading{text-align:center;color:var(--slate);padding:40px 20px;font-size:14px}
  footer{color:var(--slate);font-size:12px;text-align:center;padding:20px;border-top:1px solid var(--line)}
  footer a{color:var(--navy)}
</style>
</head>
<body>
<header><div class="wrap hd">
  <div class="brand">Robô pessoal · Distrito Federal</div>
  <h1>Concursos DF — ao vivo</h1>
  <div class="upd" id="upd">Carregando…</div>
</div></header>

<main class="wrap">
  <div class="tools">
    <input id="q" type="search" placeholder="Filtrar por órgão, cargo, palavra…" aria-label="Filtrar">
    <div class="seg" id="filtro" role="group" aria-label="Filtrar por situação">
      <button aria-pressed="true"  data-v="all">Tudo</button>
      <button aria-pressed="false" data-v="aberta">Abertos</button>
      <button aria-pressed="false" data-v="previsto">Previstos</button>
    </div>
  </div>
  <div id="lista"><div class="loading">Carregando concursos…</div></div>
</main>

<footer>
  Atualizado automaticamente todo dia por um robô no GitHub Actions · fonte: Google Notícias.<br>
  Confirme sempre os detalhes no edital oficial do órgão.
</footer>

<script>
const $=s=>document.querySelector(s);
let DADOS=[], estado={q:"",f:"all"};
const esc=s=>String(s==null?"":s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
function classe(st){const s=(st||"").toLowerCase();
  if(s.includes("inscri"))return"aberta";
  if(s.includes("public"))return"publicado";
  if(s.includes("autoriz")||s.includes("banca"))return"autorizado";
  if(s.includes("previst"))return"previsto";
  return"outro";}
function grupoF(st){const c=classe(st);return c==="aberta"||c==="publicado"?"aberta":c==="previsto"||c==="autorizado"?"previsto":"outro";}
function fmtData(d){if(!d)return"";const p=d.split("-");return p.length===3?`${p[2]}/${p[1]}/${p[0]}`:d;}
function render(){
  const lista=$("#lista");
  const termo=estado.q.toLowerCase();
  const itens=DADOS.filter(it=>{
    if(estado.f==="aberta"&&grupoF(it.status)!=="aberta")return false;
    if(estado.f==="previsto"&&grupoF(it.status)!=="previsto")return false;
    if(termo){const alvo=(it.titulo+" "+it.orgao+" "+it.fonte).toLowerCase();if(!alvo.includes(termo))return false;}
    return true;
  });
  if(!itens.length){lista.innerHTML=`<div class="empty">Nada encontrado com esse filtro.</div>`;return;}
  lista.innerHTML=itens.map(it=>`<div class="item">
    <div class="top"><a class="t" href="${esc(it.link)}" target="_blank" rel="noopener">${esc(it.titulo)}</a>
      <span class="st ${classe(it.status)}">${esc(it.status||"Novidade")}</span></div>
    <div class="meta">${it.orgao?`<b>${esc(it.orgao)}</b> · `:""}${esc(it.fonte||"")}${it.data?` · ${fmtData(it.data)}`:""}</div>
  </div>`).join("");
}
$("#q").oninput=e=>{estado.q=e.target.value;render();};
$("#filtro").querySelectorAll("button").forEach(b=>b.onclick=()=>{
  $("#filtro").querySelectorAll("button").forEach(x=>x.setAttribute("aria-pressed",x===b));
  estado.f=b.dataset.v;render();});

fetch("./data.json?"+Date.now())
  .then(r=>r.json())
  .then(d=>{
    DADOS=d.itens||[];
    $("#upd").textContent=`Última atualização: ${fmtData(d.gerado_em)} · ${DADOS.length} novidades`;
    render();
  })
  .catch(()=>{$("#lista").innerHTML=`<div class="empty">Ainda não há dados. Rode o robô uma vez em <b>Actions → Atualizar concursos DF → Run workflow</b>.</div>`;$("#upd").textContent="Aguardando a primeira coleta.";});
</script>
</body>
</html>
